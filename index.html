
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pick’n Prints | Premium 3D Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #050505;
      color: #ffffff;
      margin: 0;
      overflow-x: hidden;
      font-style: normal !important;
    }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    
    .view-section { display: none; }
    .view-section.active { display: flex; }
    
    canvas { outline: none; }
    
    .ar-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    
    * { font-style: normal !important; }
  </style>
  <script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.160.0",
    "three/examples/jsm/controls/OrbitControls": "https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls",
    "@google/genai": "https://esm.sh/@google/genai@1.41.0",
    "lucide-react": "https://esm.sh/lucide-react@0.563.0",
    "qrcode.react": "https://esm.sh/qrcode.react@4.2.0",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.4",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "three/": "https://esm.sh/three@^0.182.0/",
    "@react-three/drei": "https://esm.sh/@react-three/drei@^10.7.7",
    "@react-three/fiber": "https://esm.sh/@react-three/fiber@^9.5.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
</head>
<body class="bg-[#050505]">
  <div id="app" class="min-h-screen flex flex-col">
    <!-- Navigation -->
    <nav class="h-20 border-b border-white/5 px-6 lg:px-12 flex items-center justify-between backdrop-blur-3xl sticky top-0 z-[60] bg-black/60">
      <div class="flex items-center gap-4 cursor-pointer" onclick="navigate('home')">
        <div class="bg-indigo-600 p-2 rounded-xl" id="logo-icon"></div>
        <span class="text-xl font-black uppercase tracking-tighter">Pick'n Prints</span>
      </div>
      <div class="hidden lg:flex items-center gap-10">
        <button onclick="navigate('catalog')" class="nav-link text-[10px] font-black uppercase tracking-[0.3em] text-white/40 hover:text-white transition-all" data-view="catalog">Catalog</button>
        <button onclick="navigate('studio')" class="nav-link text-[10px] font-black uppercase tracking-[0.3em] text-white/40 hover:text-white transition-all" data-view="studio">Studio</button>
        <button onclick="navigate('archive')" class="nav-link text-[10px] font-black uppercase tracking-[0.3em] text-white/40 hover:text-white transition-all" data-view="archive">Archive</button>
      </div>
      <button class="relative p-3 bg-white/5 border border-white/10 rounded-full hover:bg-indigo-600 transition-all">
        <div id="bag-icon"></div>
        <div id="cart-count" class="hidden absolute top-0 right-0 w-4 h-4 bg-indigo-500 rounded-full text-[8px] flex items-center justify-center font-black">0</div>
      </button>
    </nav>

    <!-- Home View -->
    <section id="home-view" class="view-section flex-1 flex flex-col items-center justify-center p-10 text-center relative overflow-hidden active">
      <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-indigo-600/10 blur-[200px] rounded-full"></div>
      <div class="relative z-10 max-w-4xl space-y-12">
        <div class="inline-flex items-center gap-3 px-6 py-3 rounded-full border border-indigo-500/20 bg-indigo-500/5 text-indigo-400 text-[10px] font-black uppercase tracking-[0.4em]">
          <span id="zap-icon"></span> Original 3D Studio
        </div>
        <h1 class="text-6xl lg:text-9xl font-black tracking-tighter uppercase leading-[0.8]">Style is <span class="text-indigo-600">Personal.</span></h1>
        <p class="text-white/40 uppercase tracking-[0.2em] max-w-xl mx-auto text-sm lg:text-lg">Premium Toy-Style 3D Customization.</p>
        <div class="flex flex-col sm:flex-row gap-6 justify-center">
          <button onclick="navigate('studio')" class="px-12 py-6 bg-white text-black rounded-full font-black uppercase tracking-widest text-xs hover:scale-105 transition-all flex items-center gap-3">Open Studio <span id="arrow-icon"></span></button>
          <button onclick="navigate('catalog')" class="px-12 py-6 border border-white/10 bg-white/5 rounded-full font-black uppercase tracking-widest text-xs hover:bg-white/10 transition-all">Explore Drops</button>
        </div>
      </div>
    </section>

    <!-- Catalog View -->
    <section id="catalog-view" class="view-section flex-1 overflow-y-auto p-6 lg:p-20 space-y-12 flex-col">
      <div class="max-w-7xl mx-auto space-y-6">
        <h2 class="text-4xl lg:text-6xl font-black uppercase tracking-tighter italic">Featured Drops.</h2>
        <p class="text-white/40 uppercase text-xs tracking-widest font-bold">Curated architectural base layers.</p>
      </div>
      <div id="catalog-grid" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </section>

    <!-- Studio View -->
    <section id="studio-view" class="view-section flex-1 flex flex-col lg:grid lg:grid-cols-12 h-[calc(100vh-80px)] overflow-hidden">
      <!-- Sidebar -->
      <div class="lg:col-span-4 border-r border-white/5 bg-[#080808] flex flex-col overflow-hidden">
        <div class="p-8 space-y-8 flex-1 overflow-y-auto scrollbar-hide">
          <div class="flex justify-between items-center">
            <h2 class="text-2xl font-black tracking-tighter uppercase">Studio.</h2>
            <button onclick="resetStudio()" class="p-3 text-white/20 hover:text-white transition-colors"><span id="reset-icon"></span></button>
          </div>
          <div class="grid grid-cols-3 gap-1 p-1 bg-white/5 rounded-2xl border border-white/5">
            <button onclick="setTab('basics')" id="tab-basics" class="tab-btn py-4 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all bg-indigo-600">Basics</button>
            <button onclick="setTab('design')" id="tab-design" class="tab-btn py-4 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all text-white/30">Design</button>
            <button onclick="setTab('presets')" id="tab-presets" class="tab-btn py-4 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all text-white/30">Presets</button>
          </div>
          
          <div id="tab-content" class="space-y-10"></div>
        </div>
        <div class="p-8 border-t border-white/5 bg-black/40">
          <button id="archive-btn" onclick="saveToArchive()" class="w-full py-6 rounded-full font-black uppercase tracking-[0.4em] text-xs transition-all bg-white text-black hover:scale-[1.02]">
            COMMIT TO ARCHIVE
          </button>
        </div>
      </div>
      <!-- Viewport -->
      <div class="lg:col-span-8 relative bg-[#0a0a0a] flex flex-col h-full overflow-hidden">
        <div class="absolute top-8 left-8 z-20 flex items-center gap-4 bg-white/5 px-6 py-2.5 rounded-full border border-white/10 backdrop-blur-3xl">
          <div class="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-pulse"></div>
          <span class="text-[9px] font-black uppercase tracking-[0.4em] text-white/60">LIVE_RENDER_4K</span>
        </div>
        <div class="absolute top-8 right-8 z-20 flex items-center gap-3">
          <button onclick="toggleQR()" class="p-3.5 bg-white/5 border border-white/10 rounded-full hover:bg-white/10 transition-all"><span id="phone-icon"></span></button>
          <button onclick="downloadDesign()" class="p-3.5 bg-white/5 border border-white/10 rounded-full hover:bg-white/10 transition-all"><span id="download-icon"></span></button>
        </div>
        
        <div id="canvas-container" class="flex-1 relative flex items-center justify-center">
          <!-- Three.js Canvas will be here -->
          <div class="absolute bottom-12 left-1/2 -translate-x-1/2 z-30">
            <button onclick="toggleAR(true)" class="group relative flex items-center gap-4 px-10 py-5 bg-black/40 backdrop-blur-3xl border border-white/20 rounded-[40px] text-white transition-all hover:bg-black/60 hover:scale-105 active:scale-95 shadow-2xl">
              <div class="absolute inset-0 rounded-[40px] bg-indigo-500/10 animate-pulse pointer-events-none"></div>
              <div class="flex items-center justify-center border border-white/30 rounded-2xl p-3 bg-indigo-600 shadow-lg shadow-indigo-600/40 group-hover:rotate-3 transition-transform">
                <span id="scan-icon"></span>
              </div>
              <div class="flex flex-col items-start">
                <span class="tracking-tight text-white font-black uppercase text-[10px] leading-tight mb-0.5">Live Try-On</span>
                <span class="text-white/60 font-medium text-[11px]">View in your space</span>
              </div>
              <div class="ml-2 w-2 h-2 rounded-full bg-blue-400 animate-ping"></div>
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- Archive View -->
    <section id="archive-view" class="view-section flex-1 overflow-y-auto p-6 lg:p-20 space-y-12 flex-col">
       <div class="max-w-7xl mx-auto flex justify-between items-end">
        <div class="space-y-6">
          <h2 class="text-4xl lg:text-6xl font-black uppercase tracking-tighter italic">Personal Archive.</h2>
          <p class="text-white/40 uppercase text-xs tracking-widest font-bold">Your collection.</p>
        </div>
        <button onclick="clearArchive()" class="px-6 py-3 border border-red-500/20 text-red-400 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-red-500 hover:text-white transition-all">Clear All</button>
      </div>
      <div id="archive-grid" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </section>

    <!-- Modals -->
    <div id="ai-modal" class="fixed inset-0 z-[100] bg-black/95 hidden items-center justify-center p-6 backdrop-blur-xl">
      <div class="max-w-2xl w-full bg-[#111] border border-white/10 rounded-[48px] overflow-hidden shadow-2xl p-10 space-y-8">
        <div class="flex justify-between items-start">
          <div class="space-y-2">
            <div class="flex items-center gap-3 text-indigo-400">
              <span id="wand-icon"></span>
              <span class="text-[10px] font-black uppercase tracking-[0.4em]">Gemini Alchemy</span>
            </div>
            <h3 class="text-3xl font-black uppercase tracking-tighter">Transform Graphic</h3>
          </div>
          <button onclick="closeModal('ai-modal')" class="p-4 bg-white/5 rounded-full hover:bg-white transition-all"><span id="close-icon"></span></button>
        </div>
        <textarea id="ai-prompt" placeholder="Style prompt..." class="w-full bg-black/50 border border-white/10 rounded-3xl p-6 text-sm text-white focus:border-indigo-500 transition-all outline-none resize-none h-32"></textarea>
        <button id="ai-submit" onclick="applyAlchemy()" class="w-full py-6 bg-indigo-600 text-white rounded-full font-black uppercase tracking-widest text-xs hover:scale-[1.02] transition-all flex items-center justify-center gap-4">
          <span id="alchemy-zap"></span> APPLY ALCHEMY
        </button>
      </div>
    </div>

    <div id="qr-modal" class="fixed inset-0 z-[100] bg-black/95 hidden items-center justify-center p-6 backdrop-blur-2xl">
      <div class="max-w-md w-full bg-[#0a0a0a] border border-white/10 p-12 rounded-[64px] text-center space-y-8 shadow-2xl">
        <h3 class="text-3xl font-black uppercase tracking-tighter">Sync Studio</h3>
        <div id="qr-container" class="p-8 bg-white rounded-[40px] inline-block"></div>
        <button onclick="closeModal('qr-modal')" class="w-full py-6 border border-white/10 rounded-full font-black uppercase tracking-widest text-[10px] hover:bg-white hover:text-black transition-all">Close Sync</button>
      </div>
    </div>

    <!-- AR Overlay -->
    <div id="ar-overlay" class="fixed inset-0 bg-black z-[100] hidden items-center justify-center overflow-hidden">
      <video id="ar-video" class="ar-video" autoplay playsinline muted></video>
      <div class="absolute top-10 right-10 z-[110]">
        <button onclick="toggleAR(false)" class="p-4 bg-black/40 backdrop-blur-md border border-white/20 rounded-full text-white hover:bg-white/20 transition-all">
          <span id="close-ar-icon"></span>
        </button>
      </div>
      <div id="ar-canvas-host" class="w-full h-full relative z-[105]"></div>
      <div class="absolute bottom-16 left-1/2 -translate-x-1/2 flex flex-col items-center gap-6 z-[105]">
          <div class="px-6 py-2 bg-black/50 backdrop-blur-xl border border-white/20 rounded-full text-white/70 text-[10px] font-bold tracking-[0.3em] uppercase">
            AR Mode Active
          </div>
          <button onclick="downloadDesign()" class="flex items-center gap-3 px-12 py-5 bg-white text-black rounded-full font-black uppercase text-xs shadow-2xl hover:scale-105 active:scale-95 transition-all">
            <span id="ar-download-icon"></span> Snapshot Design
          </button>
      </div>
    </div>
  </div>

  <script type="module" src="/index.tsx"></script>
</body>
</html>
